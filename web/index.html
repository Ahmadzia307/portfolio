<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Portfolio of Muhammad Ahmad, software developer." />
    <title>Muhammad Ahmad — Software Developer</title>
    <script>
      // Apply the saved theme before React mounts to avoid a flash of the wrong colors.
      (function () {
        try {
          var s = localStorage.getItem('theme') || 'system';
          var dark = s === 'dark' ||
            (s !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.style.backgroundColor = dark ? '#0a192f' : '#f8fafc';
          document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
